name: Sync LoL to Mongo

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: python sync_lol_to_mongo.py
